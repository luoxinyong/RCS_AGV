void TaskManager::CalculatePathDeviation(
    const std::vector<geometry_msgs::Point32>& path,
    const geometry_msgs::Pose& pose_current,
    PathDeviation& path_deviation)
{
    path_deviation = PathDeviation{};
    if (path.size() < 2) {
        path_deviation.remaining_distance = 0.0;
        return;
    }

    /*========================================
     * 0. 提取机器人状态
     *========================================*/
    const double rx = pose_current.position.x;
    const double ry = pose_current.position.y;
    const double robot_yaw = QuaternionToYaw(pose_current.orientation);

    /*========================================
     * 1. 寻找机器人到路径的最小距离点（投影点，非路径点！）
     *========================================*/
    double min_dist_sq = std::numeric_limits<double>::max();
    size_t closest_seg_idx = 0;
    double closest_t = 0.0;                    // 投影参数 [0,1]
    double proj_x = 0.0, proj_y = 0.0;         // 最终投影点坐标

    for (size_t i = 0; i + 1 < path.size(); ++i) {
        const auto& A = path[i];
        const auto& B = path[i + 1];

        double seg_dx = B.x - A.x;
        double seg_dy = B.y - A.y;
        double len2 = seg_dx*seg_dx + seg_dy*seg_dy;
        if (len2 < 1e-8) continue;

        double ax = rx - A.x;
        double ay = ry - A.y;

        double t = (ax * seg_dx + ay * seg_dy) / len2;
        t = std::max(0.0, std::min(1.0, t));     // 限制在当前线段内

        double px = A.x + t * seg_dx;
        double py = A.y + t * seg_dy;

        double dx = rx - px;
        double dy = ry - py;
        double dist_sq = dx*dx + dy*dy;

        if (dist_sq < min_dist_sq) {
            min_dist_sq = dist_sq;
            closest_seg_idx = i;
            closest_t = t;
            proj_x = px;
            proj_y = py;
        }
    }

    if (min_dist_sq > 1e8) {
        path_deviation.remaining_distance = 0.0;
        return;
    }

    /*========================================
     * 2. 构建当前段的 Frenet 坐标系（以该段起点为原点）
     *========================================*/
    const auto& seg_start = path[closest_seg_idx];
    const auto& seg_end   = path[closest_seg_idx + 1];

    double tx = seg_end.x - seg_start.x;
    double ty = seg_end.y - seg_start.y;
    double seg_len = std::hypot(tx, ty);
    if (seg_len < 1e-8) {
        path_deviation.remaining_distance = 0.0;
        return;
    }

    double cos_t = tx / seg_len;      // 切线方向
    double sin_t = ty / seg_len;
    double cos_n = -sin_t;            // 左侧法线（左正）
    double sin_n = cos_t;

    double path_yaw = std::atan2(ty, tx);

    /*========================================
     * 3. 手动投影函数（不使用 lambda）
     *========================================*/
    auto manual_project = [&](double px, double py, double& out_s, double& out_l) {
        double dx = px - seg_start.x;
        double dy = py - seg_start.y;
        out_s = dx * cos_t + dy * sin_t;   // 纵向（从当前段起点开始）
        out_l = dx * cos_n + dy * sin_n;   // 横向（左侧为正）
    };

    double center_s, center_l;
    manual_project(rx, ry, center_s, center_l);

    double front_s, front_l;
    double rear_s,  rear_l;

    double front_x = rx + distance_head_ * std::cos(robot_yaw);
    double front_y = ry + distance_head_ * std::sin(robot_yaw);
    double rear_x  = rx - distance_tail_  * std::cos(robot_yaw);
    double rear_y  = ry - distance_tail_  * std::sin(robot_yaw);

    manual_project(front_x, front_y, front_s, front_l);
    manual_project(rear_x,  rear_y,  rear_s,  rear_l);

    /*========================================
     * 4. 填充偏差（完全保留你原来的语义）
     *========================================*/
    path_deviation.delta_x  = center_s;                                   // 从当前段起点开始的纵向距离
    path_deviation.delta_y  = center_l;                                   // 横向偏差（左侧为正）
    path_deviation.delta_theta = angles::normalize_angle(robot_yaw - path_yaw);

    path_deviation.front_projection = front_l;   // 只取横向
    path_deviation.rear_projection  = rear_l;

    /*========================================
     * 5. 计算全局累计弧长 + 剩余距离（精确！）
     *========================================*/
    std::vector<double> path_s(path.size(), 0.0);
    for (size_t i = 1; i < path.size(); ++i) {
        double dx = path[i].x - path[i - 1].x;
        double dy = path[i].y - path[i - 1].y;
        path_s[i] = path_s[i-1] + std::hypot(dx, dy);
    }

    // 投影点所在的全局弧长位置
    double s_projected_global = path_s[closest_seg_idx] + closest_t * seg_len;

    // 机器人相对投影点的纵向偏移（在路径方向上）
    double robot_ahead_of_projection = (rx - proj_x) * cos_t + (ry - proj_y) * sin_t;

    // 机器人实际所在的全局弧长位置
    double s_robot_global = s_projected_global + robot_ahead_of_projection;

    path_deviation.remaining_distance = std::max(0.0, path_s.back() - s_robot_global);
}