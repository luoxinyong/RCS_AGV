global_costmap:
  global_frame: map
  robot_base_frame: base_footprint

  always_send_full_costmap: true
  static_map: false
  rolling_window: true
  update_frequency: 10
  width: 200.0
  height: 200.0
  resolution: 0.05
  origin_x: -100.0
  origin_y: -100.0
  publish_frequency: 10.0
  transform_tolerance: 0.5

  plugins:
          #  - {name: free_bounds, type: "costmap_2d::FreeLayerBounds"}
          #  - {name: static_layer, type: "costmap_2d::StaticLayer"}
           - {name: obstacles,    type: "costmap_2d::ObstacleLayer"}
           - {name: inflation_layer,    type: "costmap_2d::InflationLayer"}
static_layer:
    enabled: true
    size_x: 200.0
    size_y: 200.0
    origin_x: -100.0
    origin_y: -100.0
