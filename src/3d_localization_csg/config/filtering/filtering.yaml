global_map_filter: voxel_filter # 选择滑窗地图点云滤波方法，目前支持：voxel_filter、no_filter

box_filter_size: [-150.0, 150.0, -150.0, 150.0, -150.0, 150.0]
local_map_filter: voxel_filter # 选择滑窗地图点云滤波方法，目前支持：voxel_filter、no_filter

# 当前帧
# no_filter指不对点云滤波，在匹配中，理论上点云越稠密，精度越高，但是速度也越慢
# 提供这种不滤波的模式做为对比，体会精度和效率随稠密度的变化关系
current_scan_filter: voxel_filter # 选择当前帧点云滤波方法，目前支持：voxel_filter、no_filter

# select fusion method for IMU-GNSS-Odo-Mag, available methods are:
#     1. error_state_kalman_filter
fusion_method: error_state_kalman_filter
# select fusion strategy for IMU-GNSS-Odo-Mag, available methods are:
#     1. pose 2.pose_vel
fusion_strategy: pose

# 各配置选项对应参数
## a. point cloud filtering:
voxel_filter:
    global_map:
        leaf_size: [0.9, 0.9, 0.9]
    local_map:
        leaf_size: [0.2, 0.2, 0.2]
    current_scan:
        leaf_size: [0.2, 0.2, 0.2]
## b. scan context:
scan_context:
    # a. ROI definition:
    max_radius: 80.0
    max_theta: 360.0
    # b. resolution:
    num_rings: 20
    num_sectors: 60
    # c. ring key indexing interval:
    indexing_interval: 1
    # d. min. key frame sequence distance:
    min_key_frame_seq_distance: 100
    # e. num. of nearest-neighbor candidates to check:
    num_candidates: 5
    # f. sector key fast alignment search ratio:
    #   avoid brute-force match using sector key
    fast_alignment_search_ratio: 0.1
    # g. scan context distance threshold for proposal generation:
    #   0.4-0.6 is good choice for using with robust kernel (e.g., Cauchy, DCS) + icp fitness threshold 
    #   if not, recommend 0.1-0.15
    scan_context_distance_thresh: 0.15
## c. frontend matching
# match
registration_method: NDT   # match type
NDT:
    res : 1.0
    step_size : 0.1
    trans_eps : 0.01
    max_iter : 30

ICP:
    num_threads : 4
    step_size : 0.1
    trans_eps : 0.01
    max_iter : 30

Point2Plane:
    num_threads : 4
    max_corr_dis : 1.0
    max_iter : 30
    trans_eps : 0.01
    degeneracy_threshold: 10

Small_GICP:
    thread_nums :  4
    threshlod : 1.0
    downsampling_resolution : 0.25
## e. init loc
use_file_pose_init: true  ##lxy 08.15尝试添加文件初始化方案
#file_pose_init_path: /home/bnxy/SLAM/AMR_ws/src/3d_localization_csg/config/saved_poses/latest_pose.txt
file_pose_init_path: /home/hf/hf_ws/install/share/loc_ad/config/saved_poses/latest_pose.txt

use_gnss_loc_init: false
fix_pose_loc_init:
    x_fix_init_pose: 0.0
    y_fix_init_pose: -0.09
    z_fix_init_pose: 0.0
    yaw_fix_init_pose: 0.0

use_sc_loc_init: false
match_method_loc_init: NDT_INIT
range_search_loc_init: 2
range_step_loc_init: 1
num_sample_loc_init: 36
NDT_INIT:
    res : 2.5
    step_size : 0.5
    trans_eps : 0.01
    max_iter : 30
    fitness_score_threshold : 1.0

Small_GICP_INIT:
    thread_nums :  4
    threshlod : 1.0
    downsampling_resolution : 0.25
    fitness_score_threshold : 0.2

## d. Kalman filter for IMU-lidar-GNSS fusion:
## d.1. Error-State Kalman filter for IMU-GNSS-Odo fusion:
error_state_kalman_filter:
    earth:
        # gravity can be calculated from https://www.sensorsone.com/local-gravity-calculator/ using latitude and height:
        gravity_magnitude: 9.80943
        # rotation speed, rad/s:
        rotation_speed: 7.292115e-5
        # latitude:
        latitude:   48.9827703173 # 48.9827703173 #  48.9825914868 
    covariance:
        prior:
            pos: 1.0e-6
            vel: 1.0e-6
            ori: 1.0e-6
            epsilon: 1.0e-6
            delta: 1.0e-6
        process:
            gyro: 3.0e-4
            accel: 4.5e-3
            bias_accel: 2.5e-3
            bias_gyro: 1.0e-4
        measurement:
            pose:
                pos: 1.0e-6
                ori: 1.0e-6
            pos: 1.0e-4
            vel: 2.5e-3
    motion_constraint: 
        activated: true
        w_b_thresh: 0.13